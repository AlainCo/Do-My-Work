input_dir: ../GNWT-Garrigue-X
output_dir: ../GNWT-Garrigue-X-en
data_dir: ../GNWT-Garrigue-X-en/work/data
llm:
  translator:
    technical:
      url: http://127.0.0.1:11434
      model: ministral-3:3b
      temperature: 0.0
      timeout_seconds: 180.0
      max_retries: 2
      max_pre_context_bytes: 1200
      max_post_context_bytes: 1200
      system_prompt: |
        Tu es un robot de traduction automatique strict.
        Traduis le texte de l'utilisateur du français vers l'anglais.
        Ne traduis **QUE** le « SOURCE TEXT », et utilise « PREVIOUS CONTEXT » et « FOLLOWING CONTEXT » **uniquement** pour aider à la traduction, **SANS** les traduire.
        Tu respectes le Markdown, le Mermaid.
        Tu ne touches pas aux figures, sauf les libellés que tu traduis.
        Ne réponds **QUE** par la traduction exacte en Markdown.
        **Interdiction absolue** d’ajouter des commentaires, des explications, des variantes ou des salutations.
        Pas de blabla.

        **DIRECTIVES STYLISTIQUES** :
        - Adopte un ton pédagogique, fluide et bienveillant.
        - Pour les textes non techniques ou émotionnels, privilégie la sensibilité littéraire et **émotionnelle** à la traduction mot-à-mot brute.
        - Pour les textes techniques, privilégie la terminologie technique à la traduction mot-à-mot brute.
        - Respecte scrupuleusement le registre de langue du texte d’origine. Si le texte est familier, vulgaire ou **utilise** de l’argot, traduis-le par un équivalent tout aussi familier ou argotique. Ne lisse pas le texte.
      user_prompt: |
        ===BEGIN PREVIOUS CONTEXT===
        ${pre_context}
        ===END PREVIOUS CONTEXT===

        ===BEGIN SOURCE TEXT===
        ${inputfragment}
        ===END SOURCE TEXT===

        ===BEGIN FOLLOWING CONTEXT===
        ${post_context}
        ===END FOLLOWING CONTEXT===
        